                                {

                window.startVideo = async function() {

                function setupSignaling() {
                    onChildAdded(ref(db, `ludo/${roomCode}/signals/${myColor}`), async (snap) => {
                        const fromColor = snap.key; const data = snap.val();

                            if (myColor < c) initiateCall(c);

                    });

                async function initiateCall(target) {
                    const pc = createPC(target);
                    const offer = await pc.createOffer({
                        offerToReceiveAudio: true,
                        offerToReceiveVideo: true
                    });
                    await pc.setLocalDescription(offer);
                    
                    // Send full offer object
                    await set(ref(db, `ludo/${roomCode}/signals/${target}/${myColor}/offer`), {
                        type: offer.type,
                        sdp: offer.sdp
                    });
                    
                    onValue(ref(db, `ludo/${roomCode}/signals/${myColor}/${target}/answer`), async snap => {
                        if (snap.exists() && !pc.remoteDescription) {
                            const answer = snap.val();
                            await pc.setRemoteDescription(new RTCSessionDescription(answer));
                            processIceQueue(target);
                        }
                    });
                }
        
                function createPC(target) {
                    const pc = new RTCPeerConnection(rtcConfig); 
                    peerConnections[target] = pc;
                    iceQueues[target] = [];
        
                    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                    
                    pc.onicecandidate = e => { 
                        if (e.candidate) {
                            const type = e.candidate.candidate.split(' ')[7];
                            console.log(`[ICE] Local ${type} found`);
                            push(ref(db, `ludo/${roomCode}/signals/${target}/${myColor}/candidates`), e.candidate.toJSON()); 
                        }
                    };
                    
                    pc.ontrack = e => { 
                        const v = document.getElementById(`video-${target}`); 
                        if (v && v.srcObject !== e.streams[0]) {
                            v.srcObject = e.streams[0];
                            v.play().catch(err => console.warn("Remote play prevented", err));
                        }
                    };
        
                    onChildAdded(ref(db, `ludo/${roomCode}/signals/${myColor}/${target}/candidates`), snap => {
                        const candidate = snap.val();
                        if (candidate && candidate.candidate) {
                            const type = candidate.candidate.split(' ')[7];
                            console.log(`[ICE] Remote ${type} received`);
                        }
                        
                        if (pc.remoteDescription && pc.remoteDescription.type) {
                            pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {});
                        } else {
                            iceQueues[target].push(candidate);
                        }
                    });
        
                    return pc;
                }
        
                async function handleOffer(from, offerData) {
                    const pc = createPC(from);
                    await pc.setRemoteDescription(new RTCSessionDescription(offerData));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    
                    // Send full answer object
                    await set(ref(db, `ludo/${roomCode}/signals/${from}/${myColor}/answer`), {
                        type: answer.type,
                        sdp: answer.sdp
                    });
                    processIceQueue(from);
                }
        
                function processIceQueue(target) {
                    const pc = peerConnections[target];
                    const queue = iceQueues[target];
                    if (pc && queue) {
                        while (queue.length > 0) {
                            const candidate = queue.shift();
                            pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {});
                        }
                    }
                }
        window.createRoom = async function() {
            const name = document.getElementById('playerNameInput').value.trim() || "Host", code = Math.floor(1000 + Math.random() * 9000).toString();
            await set(ref(db, 'ludo/' + code), { turn: 'red', diceValue: 0, canRoll: true, gameOver: false, players: { red: { name } }, tokens: { red: [-1,-1,-1,-1], green: [-1,-1,-1,-1], yellow: [-1,-1,-1,-1], blue: [-1,-1,-1,-1] }, status: "Waiting..." });
            roomCode = code; myColor = 'red'; localStorage.setItem('ludoRoom', code); localStorage.setItem('ludoColor', 'red'); listenToRoom();
        };

        window.joinRoom = async function() {
            const name = document.getElementById('playerNameInput').value.trim() || "Guest", code = document.getElementById('roomInput').value.trim();
            const snap = await get(ref(db, 'ludo/' + code)); if (!snap.exists()) return alert("Room not found!");
            const data = snap.val(), active = Object.keys(data.players);
            let color = (active.length === 1) ? { red: 'yellow', yellow: 'red', green: 'blue', blue: 'green' }[active[0]] : ['blue', 'green', 'red', 'yellow'].find(c => !data.players[c]);
            if (!color) return alert("Room full!");
            await update(ref(db, `ludo/${code}/players/${color}`), { name });
            roomCode = code; myColor = color; localStorage.setItem('ludoRoom', code); localStorage.setItem('ludoColor', color); listenToRoom();
        };

        window.shareInvite = () => { const t = `Play Ludo with me! 🎲 Code: ${roomCode}`; window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank'); };
        window.leaveRoom = () => { if (roomCode && myColor) remove(ref(db, `ludo/${roomCode}/players/${myColor}`)); localStorage.clear(); location.reload(); };
        
        window.startAIGame = async function() {
            const name = document.getElementById('playerNameInput').value.trim() || "Host", code = "AI_" + Math.floor(1000 + Math.random() * 9000);
            await set(ref(db, 'ludo/' + code), { 
                turn: 'red', 
                diceValue: 0, 
                canRoll: true, 
                gameOver: false, 
                isAIGame: true,
                moveCount: 0, // Initialize moveCount
                players: { 
                    red: { name }, 
                    yellow: { name: "Alexa AI" } 
                }, 
                tokens: { red: [-1,-1,-1,-1], green: [-1,-1,-1,-1], yellow: [-1,-1,-1,-1], blue: [-1,-1,-1,-1] }, 
                status: "Game Started" 
            });
            roomCode = code; myColor = 'red'; localStorage.setItem('ludoRoom', code); localStorage.setItem('ludoColor', 'red'); listenToRoom();
        };

        function checkAIMove() {
            if (gameState && gameState.isAIGame && gameState.turn !== myColor && !gameState.gameOver) {
                
                // REDUCED FREQUENCY: Tactical briefing every 10 moves
                if (gameState.moveCount > 0 && gameState.moveCount % 10 === 0 && gameState.canRoll && lastSpokenMove !== gameState.moveCount && typeof window.performTacticalAnalysis === 'function') {
                    lastSpokenMove = gameState.moveCount;
                    const aiProgress = gameState.tokens['yellow'].reduce((a, b) => a + (b === 99 ? 60 : (b === -1 ? 0 : b)), 0);
                    const userProgress = gameState.tokens['red'].reduce((a, b) => a + (b === 99 ? 60 : (b === -1 ? 0 : b)), 0);
                    const stats = `Alexa Progress: ${aiProgress} points. Prinz Progress: ${userProgress} points. Tokens home: Alexa (${gameState.tokens['yellow'].filter(t=>t===99).length}), Prinz (${gameState.tokens['red'].filter(t=>t===99).length}).`;
                    window.performTacticalAnalysis("Ludo", stats);
                }

                if (gameState.canRoll) {
                    setTimeout(rollDice, 1500);
                } else if (gameState.diceValue > 0) {
                    setTimeout(() => {
                        const aiColor = gameState.turn;
                        const tokens = gameState.tokens[aiColor];
                        const possibleIndices = tokens.map((_, i) => i).filter(i => canMoveInternalIndex(aiColor, i, gameState.diceValue));
                        
                        if (possibleIndices.length > 0) {
                            // MASTER AI LOGIC: Score every possible move
                            let bestIdx = possibleIndices[0];
                            let highestScore = -Infinity;

                            possibleIndices.forEach(idx => {
                                let score = 0;
                                const currentPos = tokens[idx];
                                const nextPos = calculateNextPos(aiColor, currentPos, gameState.diceValue);

                                // 1. KILLER INSTINCT: If I can capture Prinz, DO IT!
                                if (nextPos < 52 && !safeSquares.includes(nextPos)) {
                                    COLORS.forEach(c => {
                                        if (c !== aiColor) {
                                            if (gameState.tokens[c].includes(nextPos)) score += 1000;
                                        }
                                    });
                                }

                                // 2. FINISH LINE: Get tokens home!
                                if (nextPos === 99) score += 800;

                                // 3. ENTER THE BOARD: Get out of base!
                                if (currentPos === -1) score += 600;

                                // 4. SAFE CAMPING: Prioritize landing on a star
                                if (safeSquares.includes(nextPos)) score += 400;

                                // 5. HOME STRETCH: Get into the final color path
                                if (nextPos >= playersConfig[aiColor].homeStart) score += 300;

                                // 6. ESCAPE DANGER: If Prinz is right behind me, MOVE!
                                if (currentPos < 52) {
                                    const dangerZone = [(currentPos-1+52)%52, (currentPos-2+52)%52, (currentPos-3+52)%52];
                                    if (gameState.tokens[myColor].some(p => dangerZone.includes(p))) score += 200;
                                }

                                // 7. Progress points
                                score += (nextPos === 99 ? 100 : nextPos) * 0.5;

                                if (score > highestScore) {
                                    highestScore = score;
                                    bestIdx = idx;
                                }
                            });

                            // REDUCED FREQUENCY: Commentary only every 5 moves
                            if (gameState.moveCount % 5 === 0 && lastSpokenMove !== gameState.moveCount && typeof window.getGameCommentary === 'function') {
                                lastSpokenMove = gameState.moveCount;
                                let event = "is about to lose a token to me";
                                if (tokens[bestIdx] === -1) event = "is watching me enter the board with a 6";
                                
                                // Calculate status (crude progress check)
                                const aiProgress = gameState.tokens[aiColor].reduce((a, b) => a + (b === 99 ? 60 : (b === -1 ? 0 : b)), 0);
                                const userProgress = gameState.tokens[myColor].reduce((a, b) => a + (b === 99 ? 60 : (b === -1 ? 0 : b)), 0);
                                const status = aiProgress > userProgress ? 'winning' : (aiProgress < userProgress ? 'losing' : 'neutral');
                                
                                window.getGameCommentary("Ludo", event, status);
                            }

                            moveAI(aiColor, bestIdx);
                        }
                    }, 1000);
                }
            }
        }

        function calculateNextPos(color, pos, d) {
            if (pos === -1) return playersConfig[color].start;
            let next = pos;
            for (let i=0; i<d; i++) { 
                if (next===playersConfig[color].end) next = playersConfig[color].homeStart; 
                else if (next>=playersConfig[color].homeStart) next++; 
                else next = (next+1)%52; 
            }
            if (next > playersConfig[color].homeStart + 5) return -2; // Invalid move
            if (next === playersConfig[color].homeStart + 5) return 99; // Finished
            return next;
        }

        function canMoveInternalIndex(color, idx, val) { 
            const pos = gameState.tokens[color][idx]; 
            return pos!==99 && (pos===-1 ? val===6 : (pos<52 || pos+val <= playersConfig[color].homeStart+5)); 
        }

        async function moveAI(color, idx) {
            let u = {}, tokens = [...gameState.tokens[color]], pos = tokens[idx], d = gameState.diceValue, extra = (d===6), status = "Alexa is moving...";
            
            if (pos===-1) tokens[idx] = playersConfig[color].start;
            else {
                for (let i=0; i<d; i++) { if (pos===playersConfig[color].end) pos = playersConfig[color].homeStart; else if (pos>=playersConfig[color].homeStart) pos++; else pos = (pos+1)%52; }
                tokens[idx] = pos; if (pos===playersConfig[color].homeStart+5) { tokens[idx]=99; extra=true; }
                if (pos < 52 && !safeSquares.includes(pos)) {
                    COLORS.forEach(c => { if (c!==color) {
                        let ot = [...gameState.tokens[c]]; let cap = false;
                        ot.forEach((tp, ti) => { if (tp===pos) { ot[ti]=-1; cap=true; extra=true; status="Captured!"; } });
                        if (cap) u[`tokens/${c}`] = ot;
                    }});
                }
            }
            u[`tokens/${color}`] = tokens;
            u.moveCount = (gameState.moveCount || 0) + 1; // Increment moveCount
            if (tokens.every(t => t===99)) { 
                u.gameOver=true; 
                u.status=`You Lose!`; 
                if (typeof window.celebrateVictory === 'function') {
                    window.celebrateVictory("Alexa AI", true);
                }
            }
            else if (extra) { u.canRoll=true; u.diceValue=0; u.status=status; }
            else { 
                const next = color === 'red' ? 'yellow' : 'red';
                u.turn=next; u.canRoll=true; u.diceValue=0; u.status=`${gameState.players[next].name}'s turn`; 
            }
            await update(ref(db, `ludo/${roomCode}`), u);
        }

        function listenToRoom() { onValue(ref(db, 'ludo/' + roomCode), snap => { if (snap.exists()) { gameState = snap.val(); renderGame(); checkAIMove(); } }); }

        function renderGame() {
            const isStarted = Object.keys(gameState.players).length >= 2;
            if (!isStarted) {
                document.getElementById('lobby').classList.remove('d-none'); document.getElementById('setup-area').classList.add('d-none'); document.getElementById('wait-area').classList.remove('d-none');
                document.getElementById('roomDisplay').innerText = roomCode; COLORS.forEach(c => document.getElementById(`slot-${c}`).classList.toggle('occupied', !!gameState.players[c])); return;
            }
            document.getElementById('lobby').classList.add('d-none'); document.getElementById('game-area').classList.remove('d-none');
            const list = document.getElementById('playersList');
            if (list.querySelectorAll('.player-item').length !== Object.keys(gameState.players).length) {
                list.innerHTML = '';
                COLORS.forEach(c => { if (gameState.players[c]) {
                    const item = document.createElement('div');
                    item.className = `player-item bg-${c} p-2 rounded-3 mb-2`;
                    item.innerHTML = `<div class="video-container"><video id="video-${c}" autoplay playsinline ${c === myColor ? 'muted' : ''}></video></div>
                        <div class="player-info ms-2"><b>${gameState.players[c].name}</b> <small>${c === myColor ? '(YOU)' : ''}</small></div>`;
                    list.appendChild(item);
                }});
                if (localStream) document.getElementById(`video-${myColor}`).srcObject = localStream;
            }
            document.getElementById('turnIndicator').innerText = `${gameState.players[gameState.turn].name}'s Turn`;
            document.getElementById('turnIndicator').className = `player-turn bg-${gameState.turn}`;
            document.getElementById('status').innerText = gameState.status;
            document.getElementById('diceValue').innerText = gameState.diceValue || "?";
            document.getElementById('dice').setAttribute('data-value', gameState.diceValue || 1);
            createBoard();
        }

        function createBoard() {
            const b = document.getElementById('board'); b.innerHTML = '';
            COLORS.forEach(c => {
                const base = document.createElement('div'); base.className = `base ${c}-base`; base.id = `base-${c}`;
                base.innerHTML = '<div class="base-inner"></div><div class="base-inner"></div><div class="base-inner"></div><div class="base-inner"></div>'; b.appendChild(base);
            });
            const f = document.createElement('div'); f.className = 'finish'; f.innerHTML = '<div class="tri tri-red"></div><div class="tri tri-green"></div><div class="tri tri-yellow"></div><div class="tri tri-blue"></div><div class="finish-center"></div>'; b.appendChild(f);
            for (let r=0; r<15; r++) for (let c=0; c<15; c++) {
                if ((r<6 && c<6) || (r<6 && c>8) || (r>8 && c<6) || (r>8 && c>8) || (r>=6 && r<=8 && c>=6 && c <= 8)) continue;
                const cell = document.createElement('div'); cell.className = 'cell'; cell.id = `cell-${r}-${c}`; cell.style.gridArea = `${r+1} / ${c+1}`;
                COLORS.forEach(color => {
                    if (homePaths[color].some(h => h[0]===r && h[1]===c)) cell.classList.add(color);
                    const start = pathCoords[playersConfig[color].start]; if (start[0]===r && start[1]===c) cell.classList.add(color, 'safe');
                });
                pathCoords.forEach((p, idx) => { if (safeSquares.includes(idx) && p[0]===r && p[1]===c) cell.classList.add('safe'); }); b.appendChild(cell);
            }
            renderTokens();
        }

        function renderTokens() {
            document.querySelectorAll('.token').forEach(t => t.remove()); const posMap = {};
            COLORS.forEach(color => {
                if (!gameState.players[color]) return;
                gameState.tokens[color].forEach((pos, idx) => {
                    if (pos === 99) return;
                    let container = (pos===-1) ? document.querySelector(`#base-${color} .base-inner:nth-child(${idx+1})`) : document.getElementById(`cell-${pathCoords[pos]?.[0] ?? homePaths[color][pos - playersConfig[color].homeStart][0]}-${pathCoords[pos]?.[1] ?? homePaths[color][pos - playersConfig[color].homeStart][1]}`);
                    if (container) {
                        const token = document.createElement('div'); token.className = `token token-${color}`;
                        const key = pos===-1 ? `b-${color}-${idx}` : `c-${pos}`; if (!posMap[key]) posMap[key] = 0;
                        const offset = posMap[key] * 4; posMap[key]++; token.style.transform = `translate(${offset}px, ${offset}px)`;
                        if (gameState.turn===myColor && color===myColor && !gameState.canRoll && canMoveInternal(idx, gameState.diceValue)) {
                            token.classList.add('active'); token.onclick = e => { e.stopPropagation(); move(idx); };
                        }
                        container.appendChild(token);
                    }
                });
            });
        }

        function canMoveInternal(idx, val) { const pos = gameState.tokens[myColor][idx]; return pos!==99 && (pos===-1 ? val===6 : (pos<52 || pos+val <= playersConfig[myColor].homeStart+5)); }

        async function rollDice() {
            // Allow dice roll if it's my turn OR if it's an AI game and it's Alexa's turn
            const isAITurn = gameState.isAIGame && gameState.turn !== myColor;
            if ((gameState.turn !== myColor && !isAITurn) || !gameState.canRoll || gameState.gameOver) return;
            
            const d = document.getElementById('dice'); d.classList.add('rolling');
            setTimeout(async () => {
                const val = Math.floor(Math.random()*6)+1; d.classList.remove('rolling');
                if (!gameState.tokens[gameState.turn].some((_, i) => canMoveInternalIndex(gameState.turn, i, val))) {
                    await update(ref(db, `ludo/${roomCode}`), { diceValue: val, canRoll: false, status: "No moves!" }); setTimeout(nextTurn, 1000);
                } else await update(ref(db, `ludo/${roomCode}`), { diceValue: val, canRoll: false, status: "Move!" });
            }, 600);
        }

        async function move(idx) {
            if (gameState.turn!==myColor || gameState.canRoll) return;
            let u = {}, tokens = [...gameState.tokens[myColor]], pos = tokens[idx], d = gameState.diceValue, extra = (d===6), status = "Moving...";
            if (pos===-1) tokens[idx] = playersConfig[myColor].start;
            else {
                for (let i=0; i<d; i++) { if (pos===playersConfig[myColor].end) pos = playersConfig[myColor].homeStart; else if (pos>=playersConfig[myColor].homeStart) pos++; else pos = (pos+1)%52; }
                tokens[idx] = pos; if (pos===playersConfig[myColor].homeStart+5) { tokens[idx]=99; extra=true; }
                if (pos < 52 && !safeSquares.includes(pos)) {
                    COLORS.forEach(c => { if (c!==myColor) {
                        let ot = [...gameState.tokens[c]]; let cap = false;
                        ot.forEach((tp, ti) => { if (tp===pos) { ot[ti]=-1; cap=true; extra=true; status="Captured!"; } });
                        if (cap) u[`tokens/${c}`] = ot;
                    }});
                }
            }
            u[`tokens/${myColor}`] = tokens;
            u.moveCount = (gameState.moveCount || 0) + 1; // Increment moveCount
            if (tokens.every(t => t===99)) { 
                u.gameOver=true; 
                u.status=`You Win!`; 
                if (typeof window.celebrateVictory === 'function') {
                    window.celebrateVictory(gameState.players[myColor].name, false);
                }
            }
            else if (extra) { u.canRoll=true; u.diceValue=0; u.status=status; }
            else { const idx = COLORS.indexOf(gameState.turn); let next = (idx+1)%4; while (!gameState.players[COLORS[next]]) next = (next+1)%4; u.turn=COLORS[next]; u.canRoll=true; u.diceValue=0; u.status=`${gameState.players[COLORS[next]].name}'s turn`; }
            await update(ref(db, `ludo/${roomCode}`), u);
        }

        async function nextTurn() { const idx = COLORS.indexOf(gameState.turn); let next = (idx+1)%4; while (!gameState.players[COLORS[next]]) next = (next+1)%4; await update(ref(db, `ludo/${roomCode}`), { turn: COLORS[next], canRoll: true, diceValue: 0, status: `${gameState.players[COLORS[next]].name}'s turn` }); }
        document.getElementById('dice').onclick = rollDice; if (roomCode && myColor) listenToRoom();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.log('SW Reg Failed!', err));
            });
        }
