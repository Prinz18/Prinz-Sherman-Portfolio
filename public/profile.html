<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Community Hub</title>
    
    <!-- Canonical and Social Meta -->
    <link rel="canonical" href="https://prinzsherman.web.app/profile.html">
    <meta property="og:title" content="User Profile | Prinz Sherman Community">
    <meta property="og:description" content="View and edit your profile in the Prinz Sherman community hub.">
    <meta property="og:url" content="https://prinzsherman.web.app/profile.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://prinzsherman.web.app/assets/images/my-photo.jpeg">
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- AI Assistant Scripts -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1500.0.min.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <link rel="icon" type="image/jpg" href="assets/images/prinzo.jpg">
    
    <style>
        :root {
            --bg-deep: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #3b82f6;
        }
        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Inter', sans-serif; }
        h1, h2, h3, .navbar-brand { font-family: 'Lexend', sans-serif; }

        .profile-header {
            background: linear-gradient(to bottom, rgba(59, 130, 246, 0.2), transparent);
            padding: 100px 0 50px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .profile-img-large {
            width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--accent);
            object-fit: cover; background: #000;
        }
        .text-muted {
            color: #cbd5e1 !important; /* Brighter slate for better contrast on dark bg */
        }
        .post-card {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; transition: 0.3s;
        }
        .post-card:hover { border-color: rgba(59, 130, 246, 0.3); }
        .edit-overlay { cursor: pointer; position: relative; }
        .edit-overlay:hover::after {
            content: "Edit"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .edit-profile-input {
            background: rgba(15, 23, 42, 0.9) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #f8fafc !important;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">PS<span class="text-primary">.</span>HUB</a>
            <div class="collapse navbar-collapse" id="hubNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item"><span id="online-count" class="badge bg-success rounded-pill px-3">0 Online</span></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">Community Hub</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Portfolio</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="profile-header text-center">
        <div class="container">
            <div class="position-relative d-inline-block mb-4">
                <img id="display-profile-img" src="assets/images/prinzo.jpg" alt="User Profile Photo" class="profile-img-large shadow-lg">
                <input type="file" id="upload-photo" class="d-none" accept="image/*">
                <label for="upload-photo" id="edit-photo-btn" class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 end-0 d-none">
                    <i class="fas fa-camera"></i>
                </label>
            </div>
            <h1 id="display-name" class="fw-bold mb-1">Loading...</h1>
            <p id="display-bio" class="text-muted mb-3">No bio yet.</p>
            <div class="d-flex justify-content-center gap-2">
                <span class="badge bg-primary rounded-pill px-3">Level <span id="display-level">1</span></span>
                <button id="edit-profile-btn" class="btn btn-outline-primary btn-sm rounded-pill px-4 d-none" data-bs-toggle="modal" data-bs-target="#editModal">Edit Profile</button>
            </div>
        </div>
    </header>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <!-- Create Post (Only if it's my profile) -->
                <div id="create-post-area" class="post-card d-none">
                    <h5 class="fw-bold mb-3">Create a Post</h5>
                    <textarea id="post-content" class="form-control edit-profile-input mb-3" rows="3" placeholder="What's on your mind?"></textarea>
                    <div class="text-end">
                        <button class="btn btn-primary rounded-pill px-4" onclick="window.createPost()">Post</button>
                    </div>
                </div>

                <h4 class="fw-bold mb-4">Feed</h4>
                <div id="posts-feed">
                    <!-- Posts will load here -->
                    <div class="text-center py-5 opacity-50"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Edit Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Display Name</label>
                        <input type="text" id="edit-name" class="form-control edit-profile-input">
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-flex justify-content-between">
                            Bio 
                            <button class="btn btn-link btn-sm text-primary p-0 text-decoration-none" onclick="window.generateAIBio()">
                                <i class="fas fa-magic me-1"></i> AI Generate
                            </button>
                        </label>
                        <textarea id="edit-bio" class="form-control edit-profile-input" rows="3" placeholder="What are your interests? (e.g. Ludo, coding, space)"></textarea>
                        <small class="text-muted">Type interests above, then click AI Generate.</small>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="window.saveProfile()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Assistant UI -->
    <div id="ai-assistant-btn" onclick="toggleChat()">
        <i class="fas fa-robot"></i>
    </div>

    <div id="ai-chat-window">
        <div class="chat-header" style="height: 150px; position: relative; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); overflow: hidden;">
            <!-- Cartoon AI Avatar -->
            <img id="ai-avatar" src="/assets/images/alexa-robot.png" 
                 style="width: 120px; height: 120px; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); object-fit: contain; z-index: 5;">
            <div style="position: relative; z-index: 10; margin-top: 10px; margin-left: 15px;">
                <h6 class="mb-0 fw-bold text-white" style="text-shadow: 0 2px 10px rgba(0,0,0,0.8);">Alexa (AI Assistant)</h6>
                <div class="d-flex align-items-center gap-2">
                    <small class="text-success" style="text-shadow: 0 1px 5px rgba(0,0,0,0.5);">● Online</small>
                    <select id="chat-lang" class="bg-dark border-0 text-white-50 small rounded-pill px-2" style="outline:none; cursor:pointer; font-size: 0.75rem;" onchange="updateChatLanguage()">
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="es">Spanish</option>
                        <option value="ar">Arabic</option>
                        <option value="zh">Chinese</option>
                        <option value="de">German</option>
                        <option value="it">Italian</option>
                        <option value="ja">Japanese</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                        <option value="hi">Hindi</option>
                        <option value="ro">Romanian</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-sm text-white ms-auto" style="position: absolute; top: 10px; right: 10px; z-index: 11; background: rgba(0,0,0,0.3); border-radius: 50%;" onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chat-body">
            <div class="message ai-msg">Hi! I'm your AI assistant. How can I help you?</div>
        </div>
        <div class="chat-footer">
            <input type="file" id="ocr-upload" accept="image/*" style="display:none" onchange="handleOCRUpload(event)">
            <input type="file" id="doc-upload" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleDocUpload(event)">
            <div class="position-relative w-100 d-flex align-items-center">
                <input type="text" class="chat-input pe-5" id="chat-input" placeholder="Ask me something..." onkeypress="handleChatKey(event)" oninput="toggleChatActions()">
                <div id="chat-actions" class="position-absolute end-0 d-flex align-items-center pe-2">
                    <button class="chat-action-btn" onclick="document.getElementById('ocr-upload').click()" title="Scan & Translate Text"><i class="fas fa-camera"></i></button>
                    <button class="chat-action-btn" onclick="document.getElementById('doc-upload').click()" title="Attach Document"><i class="fas fa-paperclip"></i></button>
                    <button class="chat-action-btn" onclick="startVoiceRecognition()" id="mic-btn"><i class="fas fa-microphone"></i></button>
                </div>
            </div>
            <button class="btn btn-primary btn-circle ms-2" onclick="sendChatMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/presence.js"></script>
    <script src="/assets/js/aws-ai.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, push, update, query, orderByChild, equalTo, limitToLast } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyC7lbpbRN86mWeQ6Wwj1d8saGtY9IU6yTk", authDomain: "prinz-08ee97cc.firebaseapp.com", databaseURL: "https://prinz-08ee97cc-default-rtdb.firebaseio.com", projectId: "prinz-08ee97cc", storageBucket: "prinz-08ee97cc.firebasestorage.app", messagingSenderId: "431949566856", appId: "1:431949566856:web:47f131b012c3055c6ae03d" };
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        const urlParams = new URLSearchParams(window.location.search);
        const profileUid = urlParams.get('uid');
        let currentUser = null;

        window.generateAIBio = async function() {
            const interests = document.getElementById('edit-bio').value.trim();
            if (!interests) return alert("Please type some interests first!");
            
            const btn = document.querySelector('[onclick="window.generateAIBio()"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Thinking...';
            btn.disabled = true;

            try {
                const prompt = `Write a professional, cool, and short web developer bio for a portfolio. The developer is interested in: ${interests}. Keep it under 150 characters.`;
                const bio = await window.runAITask(prompt, "You are a professional portfolio bio writer.");
                document.getElementById('edit-bio').value = bio;
            } catch (err) {
                alert("AI Error: " + err.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-magic me-1"></i> AI Generate';
                btn.disabled = false;
            }
        };

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            const targetUid = profileUid || (user ? user.uid : null);
            
            if (!targetUid) { 
                if (!profileUid) window.location.href = 'community.html'; 
                return; 
            }
            
            loadProfile(targetUid);
            loadPosts(targetUid);

            if (user && user.uid === targetUid) {
                document.getElementById('edit-profile-btn').classList.remove('d-none');
                document.getElementById('create-post-area').classList.remove('d-none');
                document.getElementById('edit-photo-btn').classList.remove('d-none');
                
                // Ensure profile is initialized for current user
                const userRef = ref(db, `users/${user.uid}`);
                const snap = await get(userRef);
                const defaultName = user.phoneNumber || "Guest " + user.uid.slice(0, 5);
                const defaultPhoto = "assets/images/prinzo.jpg";

                if (!snap.exists()) {
                    await set(userRef, { 
                        name: user.displayName || defaultName, 
                        photoURL: user.photoURL || defaultPhoto, 
                        xp: 0, 
                        bio: "" 
                    });
                }
            }
        });

        async function loadProfile(uid) {
            onValue(ref(db, `users/${uid}`), (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    document.getElementById('display-name').innerText = data.name || "Anonymous";
                    document.getElementById('display-bio').innerText = data.bio || "No bio yet.";
                    document.getElementById('display-level').innerText = Math.floor((data.xp || 0) / 100) + 1;
                    if (data.photoURL) document.getElementById('display-profile-img').src = data.photoURL;
                    
                    if (currentUser && uid === currentUser.uid) {
                        document.getElementById('edit-name').value = data.name || "";
                        document.getElementById('edit-bio').value = data.bio || "";
                    }
                } else {
                    document.getElementById('display-name').innerText = "Unknown User";
                    document.getElementById('display-bio').innerText = "This profile hasn't been set up yet.";
                }
            });
        }

        window.saveProfile = async function() {
            const name = document.getElementById('edit-name').value.trim();
            const bio = document.getElementById('edit-bio').value.trim();
            if (!name) return alert("Name is required");
            await update(ref(db, `users/${currentUser.uid}`), { name, bio });
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        };

        document.getElementById('upload-photo').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !currentUser) return;
            
            // Visual feedback
            const profileImg = document.getElementById('display-profile-img');
            profileImg.style.opacity = '0.5';
            
            try {
                const storageRef = sRef(storage, `profiles/${currentUser.uid}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);
                await update(ref(db, `users/${currentUser.uid}`), { photoURL: url });
                profileImg.style.opacity = '1';
                alert("Profile photo updated successfully!");
            } catch (err) { 
                profileImg.style.opacity = '1';
                alert("Upload failed: " + err.message); 
            }
        });

        window.createPost = async function() {
            const content = document.getElementById('post-content').value.trim();
            if (!content || !currentUser) return;
            
            const userSnap = await get(ref(db, `users/${currentUser.uid}`));
            const userData = userSnap.val();

            const postData = {
                uid: currentUser.uid,
                authorName: userData.name || currentUser.displayName,
                authorImg: userData.photoURL || currentUser.photoURL,
                content: content,
                timestamp: Date.now()
            };
            await push(ref(db, `posts`), postData);
            document.getElementById('post-content').value = '';
        };

        async function loadPosts(uid) {
            const feed = document.getElementById('posts-feed');
            const postsQuery = query(ref(db, 'posts'), orderByChild('uid'), equalTo(uid));
            onValue(postsQuery, (snap) => {
                feed.innerHTML = '';
                if (!snap.exists()) {
                    feed.innerHTML = '<div class="text-center py-5 opacity-50">No posts yet.</div>';
                    return;
                }
                const posts = [];
                snap.forEach(child => { posts.push(child.val()); });
                posts.reverse().forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'post-card fade-in';
                    div.innerHTML = `
                        <div class="d-flex align-items-center mb-3">
                            <img src="${post.authorImg}" class="rounded-circle me-2" width="40" height="40">
                            <div>
                                <b class="d-block">${post.authorName}</b>
                                <small class="text-muted">${new Date(post.timestamp).toLocaleDateString()}</small>
                            </div>
                        </div>
                        <p class="mb-0">${post.content}</p>
                    `;
                    feed.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
